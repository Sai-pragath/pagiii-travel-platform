<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Pagiii Group</title>
</head>
<body>
    <section class="py-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center">
        <div class="w-full bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h1 class="text-2xl font-bold text-slate-800">Add New Product</h1>
                <a href="/admin/admin_dash" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition flex items-center gap-1">
                    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
            
            <div class="p-8">
                <form th:action="@{/admin/add_product}" th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="productName" class="block text-sm font-medium text-slate-700 mb-1">Product Name</label>
                            <input type="text" id="productName" th:field="*{productName}" required 
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                placeholder="Enter product name">
                        </div>
                        <div>
                            <label for="price" class="block text-sm font-medium text-slate-700 mb-1">Price ($)</label>
                            <input type="number" step="0.01" id="price" th:field="*{price}" required 
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                placeholder="0.00">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="quantity" class="block text-sm font-medium text-slate-700 mb-1">Quantity</label>
                            <input type="number" step="1" id="quantity" th:field="*{quantity}" required 
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                placeholder="Enter quantity">
                        </div>
                        <div>
                            <label for="productImage" class="block text-sm font-medium text-slate-700 mb-1">Product Image</label>
                            <input type="file" id="productImage" name="image" required 
                                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm bg-white file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                        </div>
                    </div>
                    
                    <div>
                        <label for="productDescription" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                        <textarea id="productDescription" th:field="*{productDescription}" required rows="4"
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm resize-y"
                            placeholder="Detailed description of the product..."></textarea>
                    </div>
                    
                    <div class="pt-4 flex justify-end">
                        <button type="submit" class="bg-indigo-600 text-white px-8 py-2.5 rounded-lg hover:bg-indigo-700 font-medium transition shadow-md shadow-indigo-200">
                            Save Product
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
