<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Pagiii Group</title>
</head>
<body>
    <section>
        <div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50">
            <div class="max-w-5xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                <!-- Image Section -->
                <div class="md:w-5/12 bg-indigo-50 p-8 flex items-center justify-center relative overflow-hidden hidden md:flex">
                    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600&q=80" alt="Teamwork" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-overlay">
                    <div class="relative z-10 text-center">
                        <h2 class="text-3xl font-bold text-indigo-900 mb-4">Join Us Today</h2>
                        <p class="text-indigo-700 font-medium">Create an account to discover all the features and start your journey.</p>
                    </div>
                </div>
                
                <!-- Form Section -->
                <div class="md:w-7/12 p-8 md:p-12">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-slate-800">Create an Account</h2>
                        <p class="text-slate-500 mt-2">Fill in your details below to get started.</p>
                    </div>
                    
                    <form th:action="@{/signup}" method="post" th:object="${user}" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="userName" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                                <input type="text" id="userName" th:field="*{userName}" required 
                                    class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                    placeholder="johndoe">
                            </div>
                            
                            <div>
                                <label for="emailId" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                                <input type="email" id="emailId" th:field="*{emailId}" required 
                                    class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                    placeholder="john@example.com">
                            </div>
                        </div>
                        
                        <div>
                            <label for="gender" class="block text-sm font-medium text-slate-700 mb-1">Gender</label>
                            <select id="gender" th:field="*{gender}" required 
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm bg-white">
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="phoneNumber" class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
                                <input type="number" id="phoneNumber" th:field="*{phoneNumber}" required 
                                    class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                    placeholder="1234567890">
                            </div>
                            
                            <div>
                                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                                <input type="password" id="password" th:field="*{password}" required 
                                    class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                    placeholder="••••••••">
                            </div>
                        </div>
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-3 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 transition shadow-lg shadow-indigo-200 mt-6">
                            Sign Up
                        </button>
                    </form>
                    
                    <div th:if="${error}" class="mt-4 p-4 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center">
                        <span th:text="${error}"></span>
                    </div>
                    <div th:if="${success}" class="mt-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm text-center font-medium">
                        <span th:text="${success}"></span>
                    </div>
                    
                    <div class="mt-6 text-center text-sm text-slate-600">
                        Already have an account? 
                        <a href="/login" class="text-indigo-600 hover:text-indigo-800 font-medium ml-1">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
