<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{base::layout(~{::section})}">
<head>
    <title>Product List - Pagiii Group</title>
</head>
<body>
    <section class="py-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto min-h-[calc(100vh-4rem)]">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Product List</h1>
                <p class="text-slate-500 mt-1">Manage your catalog of products and packages.</p>
            </div>
            <div class="flex gap-4">
                <a href="/admin/admin_dash" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition">
                    Dashboard
                </a>
                <a href="/admin/add_product" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-sm shadow-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add Product
                </a>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Product</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Description</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Price</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Quantity</th>
                            <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 bg-white">
                        <tr th:each="product : ${products}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 h-14 w-20 rounded-md overflow-hidden bg-slate-100 border border-slate-200">
                                        <img th:if="${product.base64Image}" th:src="'data:image/jpeg;base64,' + ${product.base64Image}" alt="Product Image" class="h-full w-full object-cover">
                                        <div th:unless="${product.base64Image}" class="h-full w-full flex items-center justify-center text-slate-400">
                                            <i class="fa-solid fa-image"></i>
                                        </div>
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-semibold text-slate-900" th:text="${product.productName}">Product Name</div>
                                        <div class="text-sm text-slate-500" th:text="'ID: ' + ${product.productId}">ID</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm text-slate-600 max-w-xs truncate" th:text="${product.productDescription}" title="${product.productDescription}">Description</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-slate-900" th:text="${product.price}">Price</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">
                                <span class="bg-indigo-50 text-indigo-700 py-1 px-3 rounded-full text-xs font-medium" th:text="${product.quantity}">0</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <form th:action="@{/admin/delete_product/{id}(id=${product.productId})}" method="post" class="inline-block">
                                    <button type="submit" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition" title="Delete">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                                No products found. <a href="/admin/add_product" class="text-indigo-600 hover:underline">Add your first product.</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
