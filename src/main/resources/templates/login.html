<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pagiii Group</title>
</head>
<body>
    <section>
        <div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50">
            <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                <!-- Image Section -->
                <div class="md:w-1/2 bg-indigo-50 p-8 flex items-center justify-center relative overflow-hidden hidden md:flex">
                    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Workspace" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-overlay">
                    <div class="relative z-10 text-center">
                        <h2 class="text-3xl font-bold text-indigo-900 mb-4">Welcome Back!</h2>
                        <p class="text-indigo-700">Log in to access your dashboard and continue where you left off.</p>
                    </div>
                </div>
                
                <!-- Form Section -->
                <div class="md:w-1/2 p-8 md:p-12">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-slate-800">Login to your account</h2>
                    </div>
                    
                    <form th:action="@{/login}" method="post" class="space-y-6">
                        <div>
                            <label for="userName" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                            <input type="text" id="userName" name="userName" required 
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                placeholder="Enter your username">
                        </div>
                        
                        <div>
                            <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                            <input type="password" id="password" name="password" required 
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition shadow-sm"
                                placeholder="••••••••">
                        </div>
                        
                        <div class="flex items-center justify-between text-sm">
                            <label class="flex items-center text-slate-600">
                                <input type="checkbox" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 mr-2">
                                Remember me
                            </label>
                            <a href="#" class="text-indigo-600 hover:text-indigo-800 font-medium">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-3 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 transition shadow-lg shadow-indigo-200">
                            Login
                        </button>
                    </form>
                    
                    <div th:if="${error}" class="mt-4 p-4 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center">
                        <span th:text="${error}"></span>
                    </div>
                    
                    <div class="mt-6 text-center text-sm text-slate-600">
                        Don't have an account? 
                        <a href="/signup" class="text-indigo-600 hover:text-indigo-800 font-medium ml-1">Create one</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
