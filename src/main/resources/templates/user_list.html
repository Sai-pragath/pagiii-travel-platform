<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - Pagiii Group</title>
</head>
<body>
    <section class="py-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto min-h-[calc(100vh-4rem)]">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">User Management</h1>
                <p class="text-slate-500 mt-1">View and manage registered user accounts.</p>
            </div>
            <a href="/admin/admin_dash" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition">
                Back to Dashboard
            </a>
        </div>
    
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">User</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Contact Info</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Gender</th>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Security</th>
                            <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 bg-white">
                        <tr th:each="user : ${users}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm">
                                        <span th:text="${#strings.substring(user.userName,0,1).toUpperCase()}">U</span>
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-semibold text-slate-900" th:text="${user.userName}">User Name</div>
                                        <div class="text-xs text-slate-500" th:text="'ID: ' + ${user.userId}">ID</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-slate-900 flex items-center gap-2"><i class="fa-solid fa-envelope text-slate-400 text-xs"></i> <span th:text="${user.emailId}"></span></div>
                                <div class="text-sm text-slate-500 flex items-center gap-2 mt-1"><i class="fa-solid fa-phone text-slate-400 text-xs"></i> <span th:text="${user.phoneNumber}"></span></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600 capitalize">
                                <span class="bg-slate-100 text-slate-700 py-1 px-3 rounded-full text-xs font-medium" th:text="${user.gender}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
                                <span class="font-mono bg-slate-50 border border-slate-200 rounded px-2 py-1 text-xs text-slate-400">••••••••</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <form th:action="@{/admin/delete_user/{id}(id=${user.userId})}" method="post" class="inline-block">
                                    <button type="submit" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition" title="Delete User">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                                No users found in the system.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
