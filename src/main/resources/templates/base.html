<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="ISO-8859-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagiii Group</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-50 top-0 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2 text-indigo-600 font-bold text-xl hover:text-indigo-700 transition">
                        <i class="fa-solid fa-layer-group"></i> Pagiii Group
                    </a>
                </div>
                
                <div class="hidden md:flex items-center space-x-6">
                    <a href="/" class="text-slate-600 hover:text-indigo-600 font-medium transition flex items-center gap-2">
                        <i class="fa-solid fa-house"></i> Home
                    </a>
                    <a href="/login" class="text-slate-600 hover:text-indigo-600 font-medium transition flex items-center gap-2">
                        <i class="fa-solid fa-right-to-bracket"></i> Login
                    </a>
                    <a href="/signup" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 shadow-sm shadow-indigo-200 transition font-medium flex items-center gap-2">
                        <i class="fa-solid fa-user-plus"></i> Register
                    </a>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-600 hover:text-indigo-600 focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100">
            <div class="px-4 pt-2 pb-4 space-y-1 shadow-lg rounded-b-xl">
                <a href="/" class="block px-3 py-2 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-md">Home</a>
                <a href="/login" class="block px-3 py-2 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-md">Login</a>
                <a href="/signup" class="block px-3 py-2 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 rounded-md">Register</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="flex-grow pt-16">
        <div th:replace="${content}"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 text-center text-slate-500 text-sm">
            <p>&copy; Pagiii 2024 pagiii.group. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
