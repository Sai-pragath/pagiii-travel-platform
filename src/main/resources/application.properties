spring.application.name=Spring_Pagiii

# spring.datasource.url=jdbc:mysql://mysql-container:3306/myapplication?createDatabaseIfNotExist=true
# Using the EC2 Private IP:
spring.datasource.url=jdbc:mysql://10.0.138.209:3306/myapplication?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port = 8080

# Multipart File Size Limit Configuration:
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Actuator / Prometheus Configuration
management.endpoints.web.exposure.include=prometheus
management.metrics.tags.application=Spring_Pagiii
